services:
  - type: web
    name: prohub-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://<your-app>.streamlit.app
      - key: MAX_UPLOAD_MB
        value: 20
      - key: PYTHONUNBUFFERED
        value: 1
